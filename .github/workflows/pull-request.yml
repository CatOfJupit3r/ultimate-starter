name: Pull Request | CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CI: true

jobs:
  ci:
    name: Validate & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check-types

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          VITE_SERVER_URL: http://localhost:3000

  # Run tests with MongoDB Memory Server
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: ci
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: 'pnpm'
      
      # Cache MongoDB binaries for mongodb-memory-server
      - name: Cache MongoDB binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-8.0.4
          restore-keys: |
            mongodb-binaries-${{ runner.os }}-
      
      - run: pnpm install --frozen-lockfile
      
      - name: Run server tests
        run: pnpm --filter=server run test
        env:
          NODE_ENV: test
          BETTER_AUTH_SECRET: test-secret
          BETTER_AUTH_URL: http://localhost:3000/auth
          LOG_LEVEL: error
